name: CD - Deploy to GCP

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - master

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        # Note: We recommend Workload Identity Federation for production.
        # If using a Service Account Key, store it in GCP_SA_KEY secret.
        # If using Workload Identity, use workload_identity_provider and service_account fields.
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: Configure Docker for GCP
      run: |
        gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

    - name: Build and Push Docker Image
      run: |
        DOCKER_TAG="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ai-researcher/app:${{ github.sha }}"
        docker build -t "$DOCKER_TAG" .
        docker push "$DOCKER_TAG"
        echo "DOCKER_TAG=$DOCKER_TAG" >> $GITHUB_ENV

    - name: Deploy to Cloud Run
      id: deploy
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: 'ai-researcher'
        image: '${{ env.DOCKER_TAG }}'
        region: '${{ secrets.GCP_REGION }}'
        # Set environment variables for the application
        env_vars: |
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}
          BACKEND_URL=http://localhost:8000
          CHECKPOINT_BACKEND=sqlite
          OUTPUT_DIR=/app/output
        flags: '--allow-unauthenticated --memory=2Gi --cpu=1 --port=8501'

    - name: Show Output URL
      run: echo "🚀 Deployed successfully to ${{ steps.deploy.outputs.url }}"
