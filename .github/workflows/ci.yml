name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      
    - name: Set up Python
      run: uv python install 3.11
      
    - name: Install dependencies
      run: uv sync --all-extras
      
    - name: Lint with Ruff
      run: uv run ruff check src/ tests/
      
    - name: Check Formatting with Ruff
      run: uv run ruff format --check src/ tests/
      
    - name: Type Check with Mypy
      run: uv run mypy src/

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Cache Tectonic
      id: cache-tectonic
      uses: actions/cache@v4
      with:
        path: /usr/local/bin/tectonic
        key: ${{ runner.os }}-tectonic

    - name: Install Tectonic
      if: steps.cache-tectonic.outputs.cache-hit != 'true'
      run: |
        curl --proto '=https' --tlsv1.2 -fsSL https://drop-sh.fullyjustified.net | sh
        sudo mv tectonic /usr/local/bin/

    - name: Run Unit Tests
      env:
        GROQ_API_KEY: testing-key
      run: uv run pytest tests/ -v -m "not e2e" --tb=short

  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      run: uv python install 3.11

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Run E2E Integration Tests
      env:
        GROQ_API_KEY: testing-key
      run: uv run pytest tests/ -v -m "e2e" --tb=short
